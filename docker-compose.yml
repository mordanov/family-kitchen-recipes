version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: recipes_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-recipes}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recipes_user} -d ${POSTGRES_DB:-recipes}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recipes_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY:-super-secret-key-change-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      USER1_NAME: ${USER1_NAME}
      USER1_PASSWORD: ${USER1_PASSWORD}
      USER2_NAME: ${USER2_NAME}
      USER2_PASSWORD: ${USER2_PASSWORD}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: recipes_frontend
    restart: unless-stopped


volumes:
  postgres_data:
  uploads_data:
