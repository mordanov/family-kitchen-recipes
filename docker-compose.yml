version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: recipes_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-recipes}
      POSTGRES_USER: ${POSTGRES_USER:-recipes_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recipes_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recipes_user} -d ${POSTGRES_DB:-recipes}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recipes_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-recipes_user}:${POSTGRES_PASSWORD:-recipes_pass}@db:5432/${POSTGRES_DB:-recipes}
      SECRET_KEY: ${SECRET_KEY:-super-secret-key-change-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      USER1_NAME: ${USER1_NAME:-user1}
      USER1_PASSWORD: ${USER1_PASSWORD:-password1}
      USER2_NAME: ${USER2_NAME:-user2}
      USER2_PASSWORD: ${USER2_PASSWORD:-password2}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: recipes_frontend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: recipes_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
