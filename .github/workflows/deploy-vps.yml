name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        run: pytest -q tests

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test:run

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add server to known hosts
        run: |
          if [ -n "${{ secrets.VPS_KNOWN_HOSTS }}" ]; then
            echo "${{ secrets.VPS_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${{ secrets.VPS_PORT || 22 }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy with docker compose
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PROJECT_DIR: ${{ secrets.VPS_PROJECT_DIR }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh -p "$VPS_PORT" -i ~/.ssh/id_rsa "$VPS_USER@$VPS_HOST" "bash -se" << EOF
          set -e

          if [ -n "$VPS_PROJECT_DIR" ]; then
            PROJECT_DIR="$VPS_PROJECT_DIR"
          else
            PROJECT_DIR="\$HOME/family-kitchen-recipes"
          fi

          mkdir -p "$PROJECT_DIR"
          cd "$PROJECT_DIR"

          if [ ! -d .git ]; then
            git clone "https://x-access-token:$GITHUB_TOKEN@github.com/$REPO.git" .
          fi

          git fetch origin
          git checkout "$REF_NAME"
          git reset --hard "origin/$REF_NAME"

          docker compose down
          docker compose up -d --build
          docker compose ps
          EOF

      - name: Health check
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PROJECT_DIR: ${{ secrets.VPS_PROJECT_DIR }}
        run: |
          ssh -p "$VPS_PORT" -i ~/.ssh/id_rsa "$VPS_USER@$VPS_HOST" "bash -se" << EOF
          set -e

          if [ -n "$VPS_PROJECT_DIR" ]; then
            cd "$VPS_PROJECT_DIR"
          else
            cd "$HOME/family-kitchen-recipes"
          fi

          sleep 5
          if curl -fsS http://localhost/api/health > /dev/null; then
            echo "Health check passed"
          else
            echo "Health check failed"
            exit 1
          fi
          EOF

