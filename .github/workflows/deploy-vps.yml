name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:

  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        if: matrix.service == 'frontend'
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        if: matrix.service == 'backend'
        with:
          python-version: "3.12"

      - run: |
          if [ "${{ matrix.service }}" = "backend" ]; then
            pip install -r requirements.txt
            pytest -q tests
          else
            npm ci
            npm run test:run
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
          VPS_PROJECT_DIR: ${{ secrets.VPS_PROJECT_DIR }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |

          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "bash -se" << 'EOF'

          set -e

          PROJECT_DIR=${VPS_PROJECT_DIR:-$HOME/family-kitchen-recipes}
          PREVIOUS_COMMIT=""

          mkdir -p "$PROJECT_DIR"
          cd "$PROJECT_DIR"

          if [ ! -d .git ]; then
            git clone https://github.com/$REPO.git .
          fi

          PREVIOUS_COMMIT=$(git rev-parse HEAD || echo "")

          git fetch origin --prune
          git checkout "$REF_NAME"
          git reset --hard "origin/$REF_NAME"

          echo "Building containers..."

          docker compose pull || true
          docker compose build
          docker compose up -d --remove-orphans

          echo "Waiting for service..."

          sleep 6

          if curl -fsS http://localhost/api/health > /dev/null; then
            echo "Health check passed"
          else
            echo "Health check failed → rollback"

            if [ -n "$PREVIOUS_COMMIT" ]; then
              git reset --hard "$PREVIOUS_COMMIT"
              docker compose up -d --build
            fi

            exit 1
          fi

          docker compose ps

          EOF